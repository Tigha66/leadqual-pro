<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - LeadQual Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #1a202c;
      margin-bottom: 15px;
      font-size: 28px;
    }
    
    p {
      color: #718096;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    .btn {
      background: #2563eb;
      color: white;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
    }
    
    .status {
      margin-top: 30px;
      padding: 20px;
      background: #f7fafc;
      border-radius: 10px;
    }
    
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #f56565;
      border-radius: 50%;
      margin-right: 10px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .cached-leads {
      margin-top: 20px;
      text-align: left;
    }
    
    .cached-leads h3 {
      color: #2d3748;
      margin-bottom: 10px;
      font-size: 16px;
    }
    
    .lead-count {
      background: #edf2f7;
      padding: 10px 15px;
      border-radius: 8px;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      Don't worry! LeadQual Pro works offline. 
      You can still view cached leads and prepare searches.
      They'll sync automatically when you're back online.
    </p>
    
    <button class="btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>
    
    <div class="status">
      <div class="status-indicator"></div>
      <span style="color: #718096;">Checking connection...</span>
    </div>
    
    <div class="cached-leads">
      <h3>📊 Cached Data Available:</h3>
      <div class="lead-count" id="cachedCount">
        Loading cached leads...
      </div>
    </div>
  </div>

  <script>
    // Check online status
    function updateStatus() {
      const indicator = document.querySelector('.status-indicator');
      const text = document.querySelector('.status span');
      
      if (navigator.onLine) {
        indicator.style.background = '#48bb78';
        text.textContent = 'Back online! Syncing...';
        setTimeout(() => window.location.reload(), 2000);
      } else {
        indicator.style.background = '#f56565';
        text.textContent = 'Still offline. Cached data available.';
      }
    }

    // Check cached leads
    async function checkCachedLeads() {
      try {
        const cache = await caches.open('leadqual-pro-v1');
        const keys = await cache.keys();
        const count = keys.length;
        
        document.getElementById('cachedCount').innerHTML = `
          <strong>${count} pages</strong> cached and ready offline
        `;
      } catch (error) {
        document.getElementById('cachedCount').textContent = 'Cache available';
      }
    }

    // Listen for online/offline events
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);

    // Initial check
    updateStatus();
    checkCachedLeads();

    // Register service worker for offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.log('SW registration failed', err));
    }
  </script>
</body>
</html>
